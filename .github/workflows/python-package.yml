# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: python-package-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUN_OPTIONAL_TESTS: False

jobs:
  build:

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 build
        python -m pip install -e ".[test]"
    - name: Dependency consistency check
      run: |
        python -m pip check
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        #flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Build + install smoke test
      run: |
        python -m build
        python -m pip install --force-reinstall --no-deps dist/*.whl
        python -c "import AniMAIRE; print('AniMAIRE import OK')"
    - name: Test with pytest
      run: |
        pytest --cov=AniMAIRE --cov-report=xml --cov-report=term-missing
    - name: Upload coverage report
      uses: actions/upload-artifact@v7
      with:
        name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
        path: coverage.xml
        if-no-files-found: error
