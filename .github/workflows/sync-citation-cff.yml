# Keep CITATION.cff in sync with [project].version in pyproject.toml.
# When the version changes, also sets date-released (UTC date) to match the release prep merge.

name: Sync CITATION.cff

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
  workflow_run:
    workflows: ["Bump version on Dependabot merge"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-citation-cff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    if: >
      (
        github.event_name == 'push' &&
        github.actor != 'github-actions[bot]'
      ) ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )

    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_run'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync version and date-released
        run: python .github/scripts/sync_citation_cff.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- CITATION.cff; then
            echo "No CITATION.cff changes."
            exit 0
          fi
          git add CITATION.cff
          git commit -m "chore: sync CITATION.cff with pyproject.toml version"
          git push
